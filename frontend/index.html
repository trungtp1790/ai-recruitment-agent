<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Recruitment Chatbot</title>
  <link rel="stylesheet" href="/frontend/styles.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>AI Recruitment Agent</h1>
      <p>Smart assistant for job search and recruitment support</p>
    </header>

    <section id="chat-window" class="chat-window" aria-live="polite"></section>

    <form id="chat-form" class="chat-form">
      <input id="message-input" name="message" type="text" placeholder="Describe your target job..." required />
      <button type="submit">Send</button>
    </form>
  </main>

  <script src="/frontend/app.js"></script>
</body>
</html>
